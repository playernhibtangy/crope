<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Telegram Video Player</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { width: min(540px, 90vw); background: #1b1b1b; border: 1px solid #333; border-radius: 12px; box-shadow: 0 14px 30px rgba(0,0,0,.55); padding: 24px; }
    h1 { font-size: 1.25rem; margin: 0 0 12px; }
    label { display: block; margin: 12px 0 6px; font-size: 0.9rem; color: #bbb; }
    input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333; background: #101010; color: #fff; font-size: 0.95rem; }
    button { margin-top: 12px; width: 100%; padding: 10px 12px; border-radius: 8px; border: none; background: #1f6feb; color: #fff; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    video { margin-top: 18px; width: 100%; border-radius: 10px; background: #000; }
    .note { margin-top: 10px; font-size: 0.85rem; color: #999; }
    .error { margin-top: 10px; font-size: 0.85rem; color: #e77; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Telegram Video Player</h1>
    <label for="urlInput">Paste a Telegram getFile URL (or any direct video URL)</label>
    <input id="urlInput" type="url" placeholder="https://api.telegram.org/bot<token>/getFile?file_id=..." autocomplete="off" spellcheck="false" />
    <button id="loadBtn">Load & Play</button>
    <div id="status" class="note">Example: https://api.telegram.org/bot<token>/getFile?file_id=...</div>

    <video id="player" controls playsinline></video>
    <div id="error" class="error" aria-live="polite"></div>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const loadBtn = document.getElementById('loadBtn');
    const player = document.getElementById('player');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    const isTelegramGetFile = (url) => {
      try {
        const u = new URL(url);
        return u.hostname.endsWith('api.telegram.org') && u.pathname.includes('/getFile');
      } catch (e) {
        return false;
      }
    };

    const buildTelegramDownloadUrl = async (getFileUrl) => {
      const res = await fetch(getFileUrl);
      const json = await res.json();
      if (!json.ok || !json.result || !json.result.file_path) {
        throw new Error(json.description || 'Invalid Telegram getFile response');
      }
      const filePath = json.result.file_path;
      const tokenMatch = getFileUrl.match(/\/bot(\d+:[A-Za-z0-9_-]+)\//);
      if (!tokenMatch) throw new Error('Could not parse bot token');
      const token = tokenMatch[1];
      return `https://api.telegram.org/file/bot${token}/${filePath}`;
    };

    const setError = (msg) => {
      errorEl.textContent = msg || '';
      statusEl.textContent = msg ? '' : 'Example: https://api.telegram.org/bot<token>/getFile?file_id=...';
    };

    const enable = (yes) => {
      loadBtn.disabled = !yes;
      urlInput.disabled = !yes;
    };

    const loadVideo = async () => {
      setError('');
      const raw = urlInput.value.trim();
      if (!raw) return setError('Paste a URL first.');

      enable(false);
      try {
        let finalUrl = raw;
        if (isTelegramGetFile(raw)) {
          finalUrl = await buildTelegramDownloadUrl(raw);
        }
        player.src = finalUrl;
        await player.load();
        await player.play();
      } catch (err) {
        console.error(err);
        setError(err.message || 'Failed to load video.');
      } finally {
        enable(true);
      }
    };

    loadBtn.addEventListener('click', loadVideo);
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadVideo();
    });
  </script>
</body>
</html>
